# Include inside the HTTPS server block. The real storage path is never public.
location ^~ /qurbani-uploads/files/ {
    client_max_body_size 1G;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://qurbani-tusd:1080/qurbani-uploads/files/;
}

location ^~ /_protected/qurbani/ {
    internal;
    alias /data/qurbani/processed/;
    add_header Cache-Control "private, no-store" always;
}
